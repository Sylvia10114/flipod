name = "flipod"
compatibility_date = "2025-07-18"
pages_build_output_dir = ".cf-pages-dist"

[vars]
# Keep production auth debug off by default.
AUTH_DEBUG_SMS_CODE = "0"
APPLE_AUDIENCE = "com.flipod.mobile"
SMS_DELIVERY_ENABLED = "true"
SMS_REGION = "cn-hangzhou"
ELEVENLABS_VOICE_ID = "21m00Tcm4TlvDq8ikWAM"
ELEVENLABS_MODEL_ID = "eleven_multilingual_v2"
AZURE_OPENAI_DEPLOYMENT = "gpt-5-chat-global-01"
AZURE_OPENAI_API_VERSION = "2025-01-01-preview"

[[d1_databases]]
binding = "DB"
database_name = "flipod-db"
# Replace this with the real remote D1 database_id before production deploy.
database_id = "local-flipod-db"
# Required for Pages local development with D1.
preview_database_id = "DB"

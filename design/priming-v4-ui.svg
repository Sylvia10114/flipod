<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', system-ui, sans-serif">

  <!-- ═══════════════════════════════════════════════
       Priming v4 · UI 设计稿
       - 无 feed 列表：priming 就是首屏 / feed 单元
       - 三层信息：meta → summary → keywords（hero）
       - 色彩走冷静教练感：深底 + 柔和 periwinkle 着色
       ═══════════════════════════════════════════════ -->

  <defs>
    <!-- Subtle top glow to suggest a light source behind the hero -->
    <radialGradient id="topGlow" cx="50%" cy="22%" r="62%">
      <stop offset="0%"  stop-color="#9BA7E8" stop-opacity="0.11"/>
      <stop offset="55%" stop-color="#9BA7E8" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#9BA7E8" stop-opacity="0"/>
    </radialGradient>
    <!-- Hairline divider between summary and keyword block -->
    <linearGradient id="hair" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#2A2A33" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#2A2A33" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2A2A33" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#0B0D12"/>
  <rect width="390" height="844" fill="url(#topGlow)"/>

  <!-- ══════ Top bar — single gear icon ══════ -->
  <g transform="translate(352, 42)" fill="none" stroke="#7A7885" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="0" r="3.6"/>
    <circle cx="0" cy="0" r="9" stroke-dasharray="1.5 2.4"/>
  </g>

  <!-- ══════ Meta line — source · CEFR · duration ══════ -->
  <text x="195" y="104" text-anchor="middle" fill="#7A7885"
        font-size="11" letter-spacing="0.6px">Planet Money  ·  B1  ·  1:30</text>

  <!-- ══════ Summary — 中文主旨：给听力的"锚"，不是"钩" ══════ -->
  <!-- 结构暗示（"三个支撑点"）= 一听懂大意时的预期位子 -->
  <text x="195" y="140" text-anchor="middle" fill="#B8B5C0"
        font-size="15" font-weight="400">加息为什么没带来衰退：三个支撑点</text>

  <!-- Hairline under summary (very subtle) -->
  <rect x="105" y="175" width="180" height="1" fill="url(#hair)"/>

  <!-- ══════ Keywords block — the visual hero ══════ -->

  <!-- Keyword 1: resilience -->
  <text x="195" y="305" text-anchor="middle" fill="#F0EEF2"
        font-size="44" font-weight="600" letter-spacing="-0.6px">resilience</text>
  <text x="195" y="332" text-anchor="middle" fill="#9A97A3"
        font-size="14" font-weight="400" letter-spacing="0.3px">韧性</text>

  <!-- Keyword 2: monetary -->
  <text x="195" y="415" text-anchor="middle" fill="#F0EEF2"
        font-size="44" font-weight="600" letter-spacing="-0.6px">monetary</text>
  <text x="195" y="442" text-anchor="middle" fill="#9A97A3"
        font-size="14" font-weight="400" letter-spacing="0.3px">货币的</text>

  <!-- Keyword 3: hike -->
  <text x="195" y="525" text-anchor="middle" fill="#F0EEF2"
        font-size="44" font-weight="600" letter-spacing="-0.6px">hike</text>
  <text x="195" y="552" text-anchor="middle" fill="#9A97A3"
        font-size="14" font-weight="400" letter-spacing="0.3px">加息</text>

  <!-- ══════ Hint — ↑ 上滑换一条 ══════ -->
  <text x="195" y="680" text-anchor="middle" fill="#4A4955"
        font-size="11" letter-spacing="0.5px">↑ 上滑换一条</text>

  <!-- ══════ Countdown ring + hold-tip ══════ -->
  <g transform="translate(195, 735)">
    <circle cx="0" cy="0" r="24" fill="none" stroke="#1E2029" stroke-width="3"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#9BA7E8" stroke-width="3"
            stroke-linecap="round"
            stroke-dasharray="113.1 37.7"
            transform="rotate(-90)"/>
    <text x="0" y="6" text-anchor="middle" fill="#F0EEF2"
          font-size="18" font-weight="600" font-variant-numeric="tabular-nums">3</text>
  </g>

  <!-- Hold-tip under the ring -->
  <text x="195" y="790" text-anchor="middle" fill="#6A6875"
        font-size="11" letter-spacing="0.5px">长按任意处暂停</text>

</svg>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flipod v2 Demo · 全流程（含 OB + Priming + 侧边菜单）</title>
<style>
  :root {
    --bg: #0e0e10;
    --bg-2: #1a1a1d;
    --bg-3: #26262b;
    --text: #f4f4f5;
    --text-2: #a1a1aa;
    --text-3: #71717a;
    --accent: #f5d142;
    --accent-2: #e8c023;
    --accent-soft: rgba(245, 209, 66, 0.12);
    --border: #2a2a2f;
    --danger: #ef4444;
    --success: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", sans-serif;
    overflow: hidden;
  }
  #app {
    position: relative;
    width: 100%;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    overflow: hidden;
  }
  button { font-family: inherit; cursor: pointer; }

  /* ============ 通用屏幕 ============ */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .screen.entering { opacity: 0; transform: translateY(20px); }
  .screen.exiting { opacity: 0; transform: translateY(-20px); pointer-events: none; }
  .pad { padding: 24px 20px 28px; }

  /* ============ 音波智能体 ============ */
  .agent {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    margin-top: 50px;
  }
  .agent-wave { width: 70px; height: 70px; }
  .agent-wave svg { width: 100%; height: 100%; }
  .wave-bar {
    fill: var(--accent);
    transform-origin: center;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .wave-bar:nth-child(1) { animation-delay: -0.4s; }
  .wave-bar:nth-child(2) { animation-delay: -0.2s; }
  .wave-bar:nth-child(3) { animation-delay: 0s; }
  .wave-bar:nth-child(4) { animation-delay: -0.2s; }
  .wave-bar:nth-child(5) { animation-delay: -0.4s; }
  @keyframes pulse {
    0%, 100% { transform: scaleY(0.5); opacity: 0.6; }
    50% { transform: scaleY(1); opacity: 1; }
  }
  .agent-bubble {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 18px;
    font-size: 15px;
    line-height: 1.55;
    max-width: 300px;
    text-align: center;
    color: var(--text);
    animation: bubble-in 0.4s ease;
  }
  @keyframes bubble-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .agent-bubble strong { color: var(--accent); }

  /* ============ Chips ============ */
  .chips {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 22px;
    width: 100%;
    max-width: 280px;
    align-self: center;
    animation: bubble-in 0.4s ease 0.15s both;
  }
  .chip {
    background: var(--bg-3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 14px;
    font-size: 14px;
    text-align: center;
    transition: background 0.15s, transform 0.15s;
  }
  .chip:active { background: var(--bg-2); transform: scale(0.98); }
  .chip.primary {
    background: var(--accent);
    color: #1a1a1d;
    border-color: var(--accent);
    font-weight: 600;
  }
  .chip.secondary {
    background: transparent;
    color: var(--text-2);
    border-color: var(--border);
  }

  /* ============ OB intro 段落进度指示器 ============ */
  .ob-progress {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }
  .ob-progress-dot {
    width: 22px;
    height: 3px;
    background: var(--bg-3);
    border-radius: 2px;
    transition: background 0.3s;
  }
  .ob-progress-dot.active { background: var(--accent); }
  .ob-progress-dot.done { background: var(--text-3); }

  /* ============ Priming 界面 ============ */
  .priming-screen {
    background: var(--bg);
    height: 100%;
    position: relative;
  }
  .priming-top {
    position: absolute;
    top: 14px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    z-index: 5;
  }
  .priming-podcast {
    color: var(--accent);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .menu-btn {
    background: transparent;
    border: none;
    color: var(--text-2);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
  }
  .menu-btn:active { background: var(--bg-2); }
  .menu-btn svg { width: 22px; height: 22px; }

  .priming-content {
    position: absolute;
    top: 64px;
    left: 24px;
    right: 24px;
    bottom: 220px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
  }
  .priming-title {
    font-size: 26px;
    line-height: 1.3;
    color: var(--text);
    font-weight: 600;
  }
  .priming-summary {
    font-size: 16px;
    line-height: 1.55;
    color: var(--text-2);
    font-style: italic;
  }
  .priming-hairline {
    height: 1px;
    background: var(--border);
    margin: 12px 0 6px;
  }
  .priming-keywords {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .priming-kw {
    font-size: 11px;
    color: var(--text-3);
    background: var(--bg-2);
    padding: 4px 9px;
    border-radius: 5px;
  }

  .priming-ring-wrap {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .priming-ring {
    width: 64px;
    height: 64px;
    position: relative;
    background: transparent;
    border: none;
    cursor: pointer;
  }
  .priming-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }
  .priming-ring .track {
    fill: none;
    stroke: var(--bg-3);
    stroke-width: 3;
  }
  .priming-ring .progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 175;
    stroke-dashoffset: 175;
    transition: stroke-dashoffset 1s linear;
  }
  .priming-ring .num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--text);
    font-weight: 600;
  }
  .priming-hint {
    color: var(--text-3);
    font-size: 11px;
  }

  .priming-swipe-hint {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text-3);
    font-size: 11px;
    z-index: 4;
    margin-top: 24px;
  }

  /* Special priming: 智能体介入气泡 */
  .priming-agent-overlay {
    position: absolute;
    top: 60px;
    left: 16px;
    right: 16px;
    z-index: 10;
    background: var(--bg-2);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: bubble-in 0.4s ease 0.5s both;
  }
  .priming-agent-overlay .pa-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .priming-agent-overlay .pa-mini-wave {
    width: 24px;
    height: 24px;
  }
  .priming-agent-overlay .pa-text {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
  }
  .priming-agent-overlay .pa-chips {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .priming-agent-overlay .pa-chip {
    flex: 1;
    background: var(--bg-3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
    text-align: center;
  }
  .priming-agent-overlay .pa-chip.primary {
    background: var(--accent);
    color: #1a1a1d;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* ============ 侧边菜单 ============ */
  .menu-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .menu-overlay.open { opacity: 1; pointer-events: auto; }
  .menu-drawer {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 75%;
    max-width: 320px;
    background: var(--bg-2);
    transform: translateX(100%);
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
    padding: 50px 0 24px;
    z-index: 51;
  }
  .menu-overlay.open .menu-drawer { transform: translateX(0); }
  .menu-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: transparent;
    border: none;
    color: var(--text-2);
    font-size: 22px;
    line-height: 1;
    padding: 6px;
  }
  .menu-header {
    padding: 0 20px 18px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .menu-greeting {
    font-size: 18px;
    color: var(--text);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .menu-meta {
    font-size: 12px;
    color: var(--text-3);
  }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 15px;
    text-align: left;
    width: 100%;
    border-bottom: 1px solid var(--border);
  }
  .menu-item:active { background: var(--bg-3); }
  .menu-item .mi-icon {
    width: 22px;
    height: 22px;
    color: var(--text-2);
  }
  .menu-item .mi-icon svg { width: 100%; height: 100%; }
  .menu-item .mi-label { flex: 1; }
  .menu-item .mi-badge {
    font-size: 11px;
    color: var(--text-3);
    background: var(--bg-3);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* ============ Phase 卡片 (容器复用) ============ */
  .phase-screen {
    height: 100%;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .phase-top {
    padding: 16px 20px 12px;
    padding-top: 16px;
  }
  .phase-progress-bar {
    height: 3px;
    background: var(--bg-3);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .phase-progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
  }
  .phase-label {
    font-size: 12px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .phase-title { font-size: 14px; color: var(--text-2); }
  .phase-keywords { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .keyword-chip {
    font-size: 11px;
    color: var(--text-3);
    background: var(--bg-2);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .phase-subtitle-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .sub-line {
    font-size: 17px;
    line-height: 1.6;
    color: var(--text-3);
    transition: color 0.3s;
    cursor: pointer;
  }
  .sub-line.active { color: var(--text); }
  .sub-line.passed { color: var(--text-2); }
  .sub-line .zh-toggle-inline {
    display: none;
    margin-top: 6px;
    font-size: 14px;
    color: var(--text-2);
    padding: 8px 10px;
    background: var(--bg-2);
    border-radius: 6px;
  }
  .sub-line.zh-shown .zh-toggle-inline { display: block; }

  /* word-level for phase 3 */
  .word { display: inline-block; }
  .word-visible { color: inherit; }
  .word-hidden {
    color: var(--text-3);
    background: var(--bg-3);
    border-radius: 3px;
    padding: 0 2px;
    margin: 0 1px;
    font-family: monospace;
    letter-spacing: 1px;
    opacity: 0.6;
  }
  /* word-level click in phase 2: 点词收藏 */
  .word.clickable { cursor: pointer; padding: 0 1px; border-radius: 2px; }
  .word.clickable:active { background: var(--accent-soft); }
  .word.in-vocab { background: var(--accent-soft); border-bottom: 1px dotted var(--accent); }

  .phase-controls {
    padding: 12px 20px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn {
    background: var(--bg-3);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 14px;
  }
  .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .ctrl-btn.primary {
    background: var(--accent);
    color: #1a1a1d;
    border-color: var(--accent);
    font-weight: 600;
  }
  .ctrl-locked-note {
    font-size: 12px;
    color: var(--text-3);
    text-align: center;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
  }

  /* ============ 题目 overlay ============ */
  .quiz-overlay {
    position: absolute;
    inset: 0;
    background: rgba(14, 14, 16, 0.97);
    z-index: 20;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 28px 24px;
    animation: bubble-in 0.3s ease;
  }
  .quiz-question {
    font-size: 18px;
    color: var(--text);
    margin-bottom: 24px;
    line-height: 1.5;
    text-align: center;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 12px; }
  .quiz-option {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 16px 18px;
    border-radius: 12px;
    font-size: 15px;
    text-align: left;
    line-height: 1.4;
  }
  .quiz-option:active { background: var(--bg-3); border-color: var(--accent); }
  .quiz-option.correct { background: rgba(34, 197, 94, 0.12); border-color: var(--success); }
  .quiz-option.wrong { background: rgba(239, 68, 68, 0.12); border-color: var(--danger); }
  .quiz-option.exit { color: var(--text-3); background: transparent; margin-top: 8px; }
  .quiz-feedback {
    margin-top: 18px;
    padding: 14px;
    border-radius: 10px;
    background: var(--bg-2);
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-2);
  }
  .quiz-next {
    margin-top: 18px;
    background: var(--accent);
    color: #1a1a1d;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
  }

  /* ============ Phase 4 归因 ============ */
  .attr-area {
    flex: 1;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .attr-q {
    font-size: 17px;
    color: var(--text);
    margin-bottom: 18px;
    text-align: center;
  }
  .attr-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  .attr-chip {
    background: var(--bg-2);
    border: 1.5px solid var(--border);
    color: var(--text-2);
    padding: 14px 12px;
    border-radius: 12px;
    font-size: 14px;
    text-align: center;
  }
  .attr-chip.selected {
    background: var(--bg-3);
    color: var(--text);
    border-color: var(--accent);
  }
  .attr-cta {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 20px 20px;
  }

  /* Phase 5 词汇 */
  .vocab-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px 20px;
  }
  .vocab-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px;
    text-align: center;
  }
  .vocab-word { font-size: 32px; color: var(--text); margin-bottom: 8px; font-weight: 600; }
  .vocab-cefr {
    display: inline-block;
    background: var(--accent);
    color: #1a1a1d;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    vertical-align: middle;
    margin-left: 8px;
    font-weight: 600;
  }
  .vocab-def { font-size: 16px; color: var(--text-2); margin: 12px 0 18px; }
  .vocab-example {
    background: var(--bg-3);
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    text-align: left;
  }
  .vocab-example .zh { color: var(--text-3); font-size: 12px; display: block; margin-top: 4px; }
  .vocab-pager {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }
  .vocab-counter { color: var(--text-3); font-size: 13px; }

  /* "看看有什么"轻量浏览 */
  .browse-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }
  .browse-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .browse-card .bc-pod {
    color: var(--accent);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .browse-card .bc-title {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .browse-card .bc-meta {
    font-size: 11px;
    color: var(--text-3);
  }

  /* ============ Toast ============ */
  .toast {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-3);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 100;
    border: 1px solid var(--border);
    animation: bubble-in 0.3s ease;
    max-width: 280px;
    text-align: center;
  }
  .toast.fade-out { opacity: 0; transition: opacity 0.3s; }

  .phase-close {
    position: absolute;
    top: 12px;
    right: 12px;
    background: transparent;
    color: var(--text-3);
    border: none;
    font-size: 22px;
    padding: 8px;
    line-height: 1;
    z-index: 5;
  }

  .debug-indicator {
    position: fixed;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.6);
    color: var(--text-3);
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 4px;
    z-index: 100;
    font-family: monospace;
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="debug-indicator" id="debug">state: init</div>

<script>
/* ============================================================================
 * Flipod v2 全流程 Demo（含 OB + Priming + 侧边菜单 + 完整 6 phase）
 * 关键设计原则（来自 flipod_revision_plan_v2.md）：
 *   - 取消"推荐 vs 自挑"二选一
 *   - 默认即无限流主线（priming → clip → priming → clip ...）
 *   - 首次 OB = 教学性介绍（自动播 + 关键节点 chip）
 *   - 第一条完成后智能体在下一条 priming 时介入介绍菜单
 *   - 30 秒承诺门槛（phase 1 内）
 *   - 容器复用 phase 1-5
 *   - 侧边菜单承接非主流程（生词本/收藏/爱心/看看有什么/学习兴趣）
 * ============================================================================ */

const FUNC_WORDS = new Set([
  'the','a','an','is','was','were','are','am','be','been','being','to',
  'and','or','but','so','if','then','than','that','this','these','those',
  'in','on','at','of','for','with','by','from','as','about','out','up','down',
  'i','you','he','she','it','we','they','me','him','her','us','them',
  'my','your','his','its','our','their','what','when','where','why','how',
  'who','which','whose','any','some','no','not','can','could','will','would',
  'should','may','might','must','do','does','did','have','has','had',
  'all','more','most','other','only','also','just','very','well',
]);

/* ---------- Mock data ---------- */

const app = document.getElementById('app');
const debug = document.getElementById('debug');
function setDebug(s) { debug.textContent = `state: ${s}`; }

function transition(newState, payload) {
  const old = app.querySelector('.screen');
  if (old) {
    old.classList.add('exiting');
    setTimeout(() => old.remove(), 300);
  }
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  state.current = newState;
  setDebug(newState);

  setTimeout(() => {
    const screen = renderScreen(newState, payload);
    if (screen) {
      screen.classList.add('screen', 'entering');
      app.appendChild(screen);
      requestAnimationFrame(() => screen.classList.remove('entering'));
    }
  }, 100);
}

function renderScreen(name, payload) {
  switch (name) {
    case 'ob-intro':       return renderObIntro(payload);
    case 'priming':        return renderPriming(payload);
    case 'phase-1':        return renderPhase1();
    case 'quiz-phase1':    return renderQuizPhase1();
    case 'phase-2':        return renderPhase2();
    case 'quiz-phase2':    return renderQuizFactOrInference(state.clip.quiz_phase2, 'phase-3');
    case 'phase-3':        return renderPhase3();
    case 'quiz-phase3':    return renderQuizFactOrInference(state.clip.quiz_phase3, 'phase-4');
    case 'phase-4':        return renderPhase4();
    case 'phase-5':        return renderPhase5();
    case 'browse':         return renderBrowse();
    case 'vocab-inbox':    return renderVocabInbox();
    default: return null;
  }
}

/* ---------- Agent SVG ---------- */
function makeAgentWaveSVG(small) {
  const cls = small ? 'small' : '';
  return `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" class="${cls}">
    <rect class="wave-bar" x="10" y="30" width="8" height="20" rx="3"/>
    <rect class="wave-bar" x="24" y="22" width="8" height="36" rx="3"/>
    <rect class="wave-bar" x="38" y="14" width="8" height="52" rx="3"/>
    <rect class="wave-bar" x="52" y="22" width="8" height="36" rx="3"/>
    <rect class="wave-bar" x="66" y="30" width="8" height="20" rx="3"/>
  </svg>`;
}

function isFuncWord(w) {
  const clean = w.toLowerCase().replace(/[^a-z']/g, '');
  return FUNC_WORDS.has(clean);
}
function renderFadedSentence(en) {
  return en.split(' ').map(w => {
    if (isFuncWord(w)) return `<span class="word word-visible">${w}</span>`;
    const len = Math.max(2, w.replace(/[^a-zA-Z']/g, '').length);
    return `<span class="word word-hidden">${'▁'.repeat(len)}</span>`;
  }).join(' ');
}

function showToast(text, duration) {
  duration = duration || 2000;
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = text;
  app.appendChild(t);
  setTimeout(() => {
    t.classList.add('fade-out');
    setTimeout(() => t.remove(), 300);
  }, duration);
}

function renderObIntro() {
  const div = document.createElement('div');
  div.classList.add('pad');
  div.innerHTML = `
    <div class="ob-progress" id="ob-progress">
      ${OB_SEGMENTS.map((_, i) => `<div class="ob-progress-dot" data-idx="${i}"></div>`).join('')}
    </div>
    <div class="agent" id="agent-area"></div>
  `;

  function showSegment(idx) {
    state.ob_segment_idx = idx;
    const seg = OB_SEGMENTS[idx];
    if (!seg) {
      // 全部播完 → 进第一条 priming
      state.ob_done = true;
      transition('priming');
      return;
    }
    // update progress dots
    div.querySelectorAll('.ob-progress-dot').forEach((d, i) => {
      d.classList.remove('active', 'done');
      if (i < idx) d.classList.add('done');
      else if (i === idx) d.classList.add('active');
    });

    const area = div.querySelector('#agent-area');
    area.innerHTML = `
      <div class="agent-wave">${makeAgentWaveSVG()}</div>
      <div class="agent-bubble">${seg.text}</div>
      ${seg.chip ? `
        <div class="chips">
          ${seg.chip.map((c, i) => `
            <button class="chip ${i === 0 ? 'primary' : 'secondary'}" data-action="${seg.chip_action ? Object.values(seg.chip_action)[i] : 'next'}">${c}</button>
          `).join('')}
        </div>
      ` : ''}
    `;

    if (seg.chip) {
      area.querySelectorAll('.chip').forEach(btn => {
        btn.addEventListener('click', () => {
          const action = btn.dataset.action;
          if (action === 'restart_segment') showSegment(idx);
          else showSegment(idx + 1);
        });
      });
    } else if (seg.auto_advance_ms) {
      setTimeout(() => {
        if (state.current === 'ob-intro' && state.ob_segment_idx === idx) showSegment(idx + 1);
      }, seg.auto_advance_ms);
    }
  }

  setTimeout(() => showSegment(0), 0);
  return div;
}

      <button class="priming-ring" id="priming-ring" aria-label="进入 clip">
        <svg viewBox="-32 -32 64 64">
          <circle class="track" cx="0" cy="0" r="28"/>
          <circle class="progress" id="ring-progress" cx="0" cy="0" r="28"/>
        </svg>
        <span class="num" id="ring-num">3</span>
      </button>
      <div class="priming-hint">长按暂停 · 点击立即进入</div>
    </div>
  `;

  setTimeout(() => {
    div.querySelector('#menu-btn').addEventListener('click', () => openMenu());

    if (showAgent) {
      div.querySelector('#pa-look').addEventListener('click', () => {
        // demo 不做完整 menu 介绍流，直接打开菜单让用户点
        openMenu();
      });
      div.querySelector('#pa-later').addEventListener('click', () => {
        div.querySelector('.priming-agent-overlay').style.display = 'none';
      });
    }

    // 倒数 ring
    let countdown = 3;
    const ringNum = div.querySelector('#ring-num');
    const ringProg = div.querySelector('#ring-progress');
    const ringBtn = div.querySelector('#priming-ring');
    let ringTimer;

    function tick() {
      ringNum.textContent = countdown;
      const pct = (3 - countdown) / 3;
      ringProg.style.strokeDashoffset = 175 - 175 * pct;
      countdown--;
      if (countdown < 0) {
        clearInterval(ringTimer);
        transition('phase-1');
      }
    }
    tick();
    ringTimer = setInterval(tick, 1000);
    state.timer = ringTimer;

    ringBtn.addEventListener('click', () => {
      clearInterval(ringTimer);
      transition('phase-1');
    });

    // 上滑换条 (demo 简化：上滑 = 重置同条 priming)
    let touchStartY = null;
    div.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
    div.addEventListener('touchend', e => {
      if (touchStartY === null) return;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (dy < -60) {
        showToast('（demo 只有一条 clip · 模拟换一条）');
        clearInterval(ringTimer);
        setTimeout(() => transition('priming'), 1200);
      }
      touchStartY = null;
    });
  }, 0);

  return div;
}

function makePhaseScreen({ label, title, subtitle, controls, lockedNote }) {
  const div = document.createElement('div');
  div.classList.add('phase-screen');
  div.innerHTML = `
    <button class="phase-close" id="phase-close" title="退出">×</button>
    <div class="phase-top">
      <div class="phase-progress-bar"><div class="phase-progress-fill" id="prog-fill"></div></div>
      <div class="phase-label">${label}</div>
      <div class="phase-title">${title}</div>
    </div>
    <div class="phase-subtitle-area" id="sub-area">${subtitle}</div>
    ${controls ? `<div class="phase-controls">${controls}</div>` :
      lockedNote ? `<div class="ctrl-locked-note">${lockedNote}</div>` : ''}
  `;
  return div;
}

function startPhaseTimer(div, { canPause, onComplete }) {
  const c = state.clip;
  const fill = div.querySelector('#prog-fill');
  const subArea = div.querySelector('#sub-area');
  const TICK = 100;
  state.playing = true;
  state.timer = setInterval(() => {
    if (canPause && !state.playing) return;
    state.audioTime += TICK / 1000;
    const pct = Math.min(100, (state.audioTime / c.duration) * 100);
    fill.style.width = pct + '%';
    if (subArea) {
      const curIdx = c.sentences.findIndex(s => state.audioTime >= s.start && state.audioTime < s.end);
      subArea.querySelectorAll('.sub-line').forEach((el, i) => {
        el.classList.remove('active', 'passed');
        if (i === curIdx) el.classList.add('active');
        else if (i < curIdx) el.classList.add('passed');
      });
    }
    if (state.audioTime >= c.duration) {
      clearInterval(state.timer); state.timer = null;
      state.playing = false;
      setTimeout(onComplete, 300);
    }
  }, TICK);
}

/* ---------- Phase 1: 中文盲听 + 30 秒承诺门槛 ---------- */
function renderPhase1() {
  const c = state.clip;
  state.audioTime = 0;
  const div = makePhaseScreen({
    label: 'PHASE 1 · 把意思（中文 · 盲听）',
    title: c.title,
    subtitle: `
      <div class="phase-keywords" style="margin-bottom:8px">
        ${c.keywords.map(k => `<span class="keyword-chip">${k}</span>`).join('')}
      </div>
      ${c.sentences.map((s, i) => `<div class="sub-line" data-idx="${i}">${s.zh}</div>`).join('')}
    `,
    lockedNote: '<div style="display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap"><span id="locked-note-text">先听 30 秒，之后可以继续或退出</span><button id="enough-btn" style="display:none;background:transparent;border:1px solid var(--border);color:var(--text-2);padding:6px 14px;border-radius:8px;font-size:12px">先到这吧 →</button></div>',
  });
  setTimeout(() => {
    div.querySelector('#phase-close').addEventListener('click', () => {
      const inThreshold = state.audioTime < 30;
      const msg = inThreshold ? '还没听满 30 秒，确定要取消吗？这次不算开始。' : '确定要退出？';
      if (confirm(msg)) goNextClip();
    });
    const enoughBtn = div.querySelector('#enough-btn');
    const lockedNoteText = div.querySelector('#locked-note-text');
    const unlockChecker = setInterval(() => {
      if (state.audioTime >= 30) {
        enoughBtn.style.display = 'inline-block';
        if (lockedNoteText) lockedNoteText.textContent = '继续听完会有 1 道主旨题';
        clearInterval(unlockChecker);
      }
    }, 200);
    enoughBtn.addEventListener('click', () => {
      clearInterval(unlockChecker);
      showToast(`听了 ${Math.floor(state.audioTime)} 秒 · partial_listen`, 1500);
      setTimeout(goNextClip, 1500);
    });
    startPhaseTimer(div, {
      canPause: false,
      onComplete: () => { clearInterval(unlockChecker); transition('quiz-phase1'); },
    });
  }, 0);
  return div;
}

/* ---------- Quiz: phase 1 主旨题 ---------- */
function renderQuizPhase1() {
  const div = document.createElement('div');
  div.classList.add('phase-screen');
  const q = state.clip.quiz_phase1;
  div.innerHTML = `
    <div class="quiz-overlay">
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-options">
        ${q.options.map((opt, i) => `
          <button class="quiz-option ${opt.action === 'exit' ? 'exit' : ''}" data-idx="${i}">${opt.text}</button>
        `).join('')}
      </div>
    </div>
  `;
  setTimeout(() => {
    div.querySelectorAll('.quiz-option').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx, 10);
        const action = q.options[idx].action;
        if (action === 'exit') {
          showToast('completed_phase1 · 浅完成', 1500);
          setTimeout(goNextClip, 1500);
        } else {
          state.audioTime = 0;
          transition('phase-2');
        }
      });
    });
  }, 0);
  return div;
}

/* ---------- Phase 2: 英文 + 可暂停 + 后退3s + 点词收藏 ---------- */
function renderPhase2() {
  const c = state.clip;
  state.audioTime = 0;
  // 拆词，每个非功能词加 clickable
  const renderEnSentence = (en) => en.split(' ').map(w => {
    const clean = w.replace(/[^a-zA-Z']/g, '');
    if (!clean) return w;
    if (isFuncWord(w)) return `<span class="word">${w}</span>`;
    const inVocab = state.vocab_inbox.includes(clean);
    return `<span class="word clickable ${inVocab ? 'in-vocab' : ''}" data-w="${clean}">${w}</span>`;
  }).join(' ');

  const div = makePhaseScreen({
    label: 'PHASE 2 · 解码（英文 · 可暂停 · 点词加生词本）',
    title: c.title,
    subtitle: c.sentences.map((s, i) => `
      <div class="sub-line" data-idx="${i}">
        ${renderEnSentence(s.en)}
        <div class="zh-toggle-inline">${s.zh}</div>
      </div>
    `).join(''),
    controls: `
      <button class="ctrl-btn" id="back-3s">↶ 3s</button>
      <button class="ctrl-btn primary" id="play-pause">⏸</button>
      <span style="color:var(--text-3);font-size:12px;margin-left:8px">点词收藏 · 长按看中文</span>
    `,
  });
  setTimeout(() => {
    div.querySelector('#phase-close').addEventListener('click', () => {
      if (confirm('确定要退出？')) goNextClip();
    });

    // 点字幕行 = 显中文；点词 = 收藏
    div.querySelector('#sub-area').addEventListener('click', e => {
      const wordEl = e.target.closest('.word.clickable');
      if (wordEl) {
        e.stopPropagation();
        const w = wordEl.dataset.w;
        if (state.vocab_inbox.includes(w)) {
          state.vocab_inbox = state.vocab_inbox.filter(x => x !== w);
          wordEl.classList.remove('in-vocab');
          showToast(`「${w}」已从生词本移除`, 1200);
        } else {
          state.vocab_inbox.push(w);
          wordEl.classList.add('in-vocab');
          showToast(`「${w}」已加入生词本 · 影响推荐`, 1200);
        }
        return;
      }
      const line = e.target.closest('.sub-line');
      if (line) line.classList.toggle('zh-shown');
    });

    const playBtn = div.querySelector('#play-pause');
    playBtn.addEventListener('click', () => {
      state.playing = !state.playing;
      playBtn.textContent = state.playing ? '⏸' : '▶';
    });
    div.querySelector('#back-3s').addEventListener('click', () => {
      state.audioTime = Math.max(0, state.audioTime - 3);
    });
    startPhaseTimer(div, {
      canPause: true,
      onComplete: () => transition('quiz-phase2'),
    });
  }, 0);
  return div;
}

/* ---------- Quiz: 通用解码/推理题 ---------- */
function renderQuizFactOrInference(quizData, nextState) {
  const div = document.createElement('div');
  div.classList.add('phase-screen');
  div.innerHTML = `
    <div class="quiz-overlay">
      <div class="quiz-question">${quizData.question}</div>
      <div class="quiz-options">
        ${quizData.options.map((opt, i) => `
          <button class="quiz-option" data-idx="${i}">${opt.text}</button>
        `).join('')}
      </div>
      <div id="feedback-slot"></div>
    </div>
  `;
  setTimeout(() => {
    let answered = false;
    div.querySelectorAll('.quiz-option').forEach(btn => {
      btn.addEventListener('click', () => {
        if (answered) return;
        answered = true;
        const idx = parseInt(btn.dataset.idx, 10);
        const opt = quizData.options[idx];
        div.querySelectorAll('.quiz-option').forEach((b, j) => {
          b.disabled = true;
          if (quizData.options[j].correct) b.classList.add('correct');
          else if (j === idx) b.classList.add('wrong');
        });
        const slot = div.querySelector('#feedback-slot');
        slot.innerHTML = `
          <div class="quiz-feedback">${opt.correct ? '✓ 对了 — ' : '✗ 不对 — '}${opt.why}</div>
          <button class="quiz-next" id="quiz-next">继续</button>
        `;
        slot.querySelector('#quiz-next').addEventListener('click', () => {
          state.audioTime = 0;
          transition(nextState);
        });
      });
    });
  }, 0);
  return div;
}

/* ---------- Phase 3: 渐隐 ---------- */
function renderPhase3() {
  const c = state.clip;
  state.audioTime = 0;
  const div = makePhaseScreen({
    label: 'PHASE 3 · 渐隐（实词消失）',
    title: c.title,
    subtitle: c.sentences.map((s, i) => `
      <div class="sub-line" data-idx="${i}">${renderFadedSentence(s.en)}</div>
    `).join(''),
    controls: `
      <button class="ctrl-btn" id="back-3s">↶ 3s</button>
      <button class="ctrl-btn primary" id="play-pause">⏸</button>
      <span style="color:var(--text-3);font-size:12px;margin-left:8px">实词隐藏 · 靠功能词撑住</span>
    `,
  });
  setTimeout(() => {
    div.querySelector('#phase-close').addEventListener('click', () => {
      if (confirm('确定要退出？')) goNextClip();
    });
    const playBtn = div.querySelector('#play-pause');
    playBtn.addEventListener('click', () => {
      state.playing = !state.playing;
      playBtn.textContent = state.playing ? '⏸' : '▶';
    });
    div.querySelector('#back-3s').addEventListener('click', () => {
      state.audioTime = Math.max(0, state.audioTime - 3);
    });
    startPhaseTimer(div, {
      canPause: true,
      onComplete: () => transition('quiz-phase3'),
    });
  }, 0);
  return div;
}

/* ---------- Phase 4: 无字幕 + 归因 ---------- */
function renderPhase4() {
  const c = state.clip;
  state.audioTime = 0;
  const div = document.createElement('div');
  div.classList.add('phase-screen');
  div.innerHTML = `
    <button class="phase-close" id="phase-close">×</button>
    <div class="phase-top">
      <div class="phase-progress-bar"><div class="phase-progress-fill" id="prog-fill"></div></div>
      <div class="phase-label">PHASE 4 · 检验（无字幕）</div>
      <div class="phase-title">${c.title}</div>
    </div>
    <div class="phase-subtitle-area" id="sub-area" style="justify-content:center;align-items:center;text-align:center">
      <div style="color:var(--text-3);font-size:14px">🎧 全程无字幕</div>
      <div id="play-hint" style="margin-top:14px;color:var(--text-2);font-size:13px">点下方播放开始</div>
    </div>
    <div class="phase-controls">
      <button class="ctrl-btn primary" id="p4-play">▶</button>
    </div>
  `;
  setTimeout(() => {
    div.querySelector('#phase-close').addEventListener('click', () => {
      if (confirm('确定要退出？')) goNextClip();
    });
    let started = false;
    div.querySelector('#p4-play').addEventListener('click', () => {
      if (started) return;
      started = true;
      div.querySelector('#p4-play').disabled = true;
      div.querySelector('#play-hint').textContent = '播放中...';
      startPhaseTimer(div, {
        canPause: false,
        onComplete: () => renderAttribution(div),
      });
    });
  }, 0);
  return div;
}

function renderAttribution(div) {
  const subArea = div.querySelector('.phase-subtitle-area');
  div.querySelector('.phase-controls').remove();
  subArea.style.justifyContent = 'flex-start';
  subArea.style.alignItems = 'stretch';
  subArea.innerHTML = `
    <div class="attr-area">
      <div class="attr-q">这段你主要卡在哪？</div>
      <div class="attr-grid">
        ${ATTR_TAGS.map(t => `
          <button class="attr-chip" data-key="${t.key}">
            <div style="font-size:18px;margin-bottom:4px">${t.icon}</div>
            ${t.label}
          </button>
        `).join('')}
      </div>
    </div>
    <div class="attr-cta">
      <button class="ctrl-btn primary" id="attr-submit" disabled>提交</button>
      <button class="ctrl-btn" id="attr-skip">全都听懂了</button>
    </div>
  `;
  const picked = new Set();
  const submitBtn = subArea.querySelector('#attr-submit');
  subArea.querySelectorAll('.attr-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const k = chip.dataset.key;
      if (picked.has(k)) { picked.delete(k); chip.classList.remove('selected'); }
      else { picked.add(k); chip.classList.add('selected'); }
      submitBtn.disabled = picked.size === 0;
    });
  });
  subArea.querySelector('#attr-submit').addEventListener('click', () => {
    state.attribution = Array.from(picked);
    transition('phase-5');
  });
  subArea.querySelector('#attr-skip').addEventListener('click', () => {
    state.attribution = [];
    showToast('全听懂了 · 跳过词汇复习', 1500);
    setTimeout(goNextClip, 1500);
  });
}

/* ---------- Phase 5: 词汇复习（基于 vocab_inbox + clip 内 C1+ 兜底） ---------- */
function renderPhase5() {
  const c = state.clip;
  // 优先用用户在 phase 2 点过的词
  let vocabList = c.vocab.filter(v => state.vocab_inbox.some(p => p.toLowerCase() === v.word.toLowerCase()));
  if (!vocabList.length) vocabList = c.vocab; // 兜底
  let cur = 0;
  const div = document.createElement('div');
  div.classList.add('phase-screen');
  div.innerHTML = `
    <button class="phase-close" id="phase-close">×</button>
    <div class="phase-top">
      <div class="phase-label">PHASE 5 · 词汇复习</div>
      <div class="phase-title" style="font-size:13px;color:var(--text-3)">${vocabList.length === 0 ? '本 clip 无 C1+ 词' : `共 ${vocabList.length} 个 · ${state.vocab_inbox.length ? '基于你点过的词' : '系统兜底'}`}</div>
    </div>
    <div class="vocab-area" id="vocab-area"></div>
    <div class="vocab-pager">
      <button class="ctrl-btn" id="v-prev">上一个</button>
      <div class="vocab-counter" id="v-counter"></div>
      <button class="ctrl-btn primary" id="v-next">下一个</button>
    </div>
  `;
  function renderOne() {
    const w = vocabList[cur];
    const slot = div.querySelector('#vocab-area');
    slot.innerHTML = `
      <div class="vocab-card">
        <div class="vocab-word">${w.word}<span class="vocab-cefr">${w.cefr}</span></div>
        <div class="vocab-def">${w.def}</div>
        <div class="vocab-example">${w.example_en}<span class="zh">${w.example_zh}</span></div>
      </div>
    `;
    div.querySelector('#v-counter').textContent = `${cur+1} / ${vocabList.length}`;
    div.querySelector('#v-prev').disabled = cur === 0;
    div.querySelector('#v-next').textContent = cur === vocabList.length - 1 ? '完成' : '下一个';
  }
  setTimeout(() => {
    div.querySelector('#phase-close').addEventListener('click', () => goNextClip());
    if (vocabList.length === 0) {
      div.querySelector('#vocab-area').innerHTML = `<div style="text-align:center;color:var(--text-3)">本 clip 没有 C1+ 词，跳过</div>`;
      div.querySelector('.vocab-pager').remove();
      setTimeout(goNextClip, 1500);
      return;
    }
    renderOne();
    div.querySelector('#v-prev').addEventListener('click', () => { if (cur > 0) { cur--; renderOne(); } });
    div.querySelector('#v-next').addEventListener('click', () => {
      if (cur === vocabList.length - 1) goNextClip();
      else { cur++; renderOne(); }
    });
  }, 0);
  return div;
}

/* ============================================================
 * 完成一条 → 进入下一条 priming
 * ============================================================ */
function goNextClip() {
  state.clips_completed++;
  state.audioTime = 0;
  state.attribution = [];
  // demo 只有一条 mock clip，循环回去
  state.clip = MOCK_CLIP;
  transition('priming');
}

/* ============================================================
 * 侧边菜单：生词本 / 看看有什么
 * ============================================================ */
function renderVocabInbox() {
  const div = document.createElement('div');
  div.classList.add('phase-screen');
  div.innerHTML = `
    <button class="phase-close" id="phase-close">×</button>
    <div class="phase-top">
      <div class="phase-label">生词本</div>
      <div class="phase-title" style="font-size:13px;color:var(--text-3)">共 ${state.vocab_inbox.length} 个 · 影响推荐算法</div>
    </div>
    <div class="browse-list">
      ${state.vocab_inbox.length === 0 ? `
        <div style="text-align:center;color:var(--text-3);margin-top:60px">
          还没有词。<br><br>在 phase 2 英文字幕点词加进来。
        </div>
      ` : state.vocab_inbox.map(w => `
        <div class="browse-card">
          <div class="bc-title">${w}</div>
          <div class="bc-meta">demo 不接 GPT 兜底释义</div>

      `).join('')}
    </div>
  `;
  setTimeout(() => {
    div.querySelector('#phase-close').addEventListener('click', () => transition('priming'));

  return div;
}

/* ============================================================
 * Boot
 * ============================================================ */
transition('ob-intro');

</script>
